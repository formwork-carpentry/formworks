name: Performance

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  bundle-size:
    name: Bundle Size Analysis
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.x
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build all packages
        run: npm run build

      - name: Measure bundle sizes
        run: |
          echo "# Bundle Size Report" > /tmp/bundle-sizes.md
          echo "" >> /tmp/bundle-sizes.md
          echo "| Package | Size (bytes) | Gzipped |" >> /tmp/bundle-sizes.md
          echo "|---------|-------------|---------|" >> /tmp/bundle-sizes.md
          for pkg in packages/*/dist; do
            if [ -d "$pkg" ]; then
              pkgname=$(echo "$pkg" | cut -d'/' -f2)
              size=$(du -sb "$pkg" 2>/dev/null | cut -f1 || echo "N/A")
              gzip_size=$(find "$pkg" -name "*.js" -exec gzip -c {} \; 2>/dev/null | wc -c || echo "N/A")
              echo "| @formwork/$pkgname | $size | $gzip_size |" >> /tmp/bundle-sizes.md
            fi
          done
          cat /tmp/bundle-sizes.md

      - name: Upload bundle size report
        uses: actions/upload-artifact@v4
        with:
          name: bundle-size-report
          path: /tmp/bundle-sizes.md
          retention-days: 30

      - name: Comment bundle sizes on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const report = fs.readFileSync('/tmp/bundle-sizes.md', 'utf8');
            const body = `## 📦 Bundle Size Report\n\n${report}`;
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body
            });
